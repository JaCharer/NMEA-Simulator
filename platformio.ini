; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env:esp32dev]
platform = espressif32
board = esp32dev ; TTGO używa standardowego profilu esp32dev
framework = arduino
monitor_speed = 921600
monitor_filters = log2file
lib_deps =
  ;SignalK/SensESP @ ^3.0.0
  bodmer/TFT_eSPI @ ^2.5.0 ; Dorzucamy genialną bibliotekę graficzną
  me-no-dev/AsyncTCP
  me-no-dev/ESPAsyncWebServer
build_flags =
  -D USE_LCD ; Odkomentuj, jeśli chcesz używać ekranu (TTGO T-Display)
  -D USE_BUTTONS ; Odkomentuj, jeśli chcesz używać przycisków (TTGO T-Display)
  -D STEADY_WIND_FOR_TESTS ; Odkomentuj, jeśli chcesz używać stałego wiatru dla testów
  ; Flagi konfiguracyjne wprost pod ekran TTGO T-Display
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=135
  -D TFT_HEIGHT=240
  -D CGRAM_OFFSET=1
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=16
  -D TFT_RST=23
  -D TFT_BL=4
  -D TFT_INVERSION_ON=1
  -D TFT_RGB_ORDER=TFT_BGR
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D SPI_FREQUENCY=27000000

board_build.filesystem = littlefs